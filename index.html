<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>東山口幹線 草刈チェックリスト</title>
<style>
  html, body{margin:0; padding:0; background:#E9EEE2;}

  :root{
    --bg:#E9EEE2;
    --bg-card:#F7F9F2;
    --ink:#22302A;
    --ink-soft:#5B6A61;
    --line:#C9D2BE;
    --pending:#B9822A;
    --pending-bg:#F5E8CC;
    --done:#2F6B52;
    --done-bg:#DCEBE1;
    --rust:#9C4E2E;
    --rust-bg:#EEDBCC;
    --blocked:#A63B2E;
    --blocked-bg:#F1DAD3;
  }
  *{box-sizing:border-box;}
  #app{
    font-family:'IBM Plex Sans JP','IBM Plex Sans',sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100%;
    padding-bottom:40px;
  }
  #loading{padding:40px 20px; text-align:center; color:var(--ink-soft); font-size:13px;}

  header.top{
    position:sticky; top:0; z-index:20;
    background:var(--bg);
    padding:14px 14px 10px;
    border-bottom:2px solid var(--ink);
  }
  .line-name{font-size:12px; color:var(--rust); font-weight:700; letter-spacing:.08em;}
  .map-link{
    display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700;
    color:var(--bg-card); background:var(--ink); border-radius:12px; padding:4px 10px;
    text-decoration:none; float:right; margin-top:-2px;
  }
  h1{
    font-family:'Oswald',sans-serif; font-weight:700; font-size:20px; margin:2px 0 0;
    letter-spacing:.01em;
  }
  .sub{font-size:11px; color:var(--ink-soft); margin-top:2px; line-height:1.6;}
  .sub .warn-chip{color:var(--blocked); font-weight:700;}

  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-top:12px;}
  .stat{
    background:var(--bg-card); border:1px solid var(--line); border-radius:4px;
    padding:7px 6px 8px; text-align:center;
  }
  .stat .lbl{font-size:9.5px; color:var(--ink-soft); letter-spacing:.04em;}
  .stat .val{font-family:'IBM Plex Mono',monospace; font-size:15px; font-weight:600; margin-top:2px;}
  .stat .pct{font-size:10px; color:var(--done); font-weight:600;}
  .stat .bar{height:4px; background:var(--line); border-radius:2px; margin-top:5px; overflow:hidden;}
  .stat .bar > div{height:100%; background:var(--done);}

  .rail-wrap{margin-top:10px;}
  .rail-lbl{font-size:9.5px; color:var(--ink-soft); letter-spacing:.05em; margin-bottom:4px;}
  .rail{display:flex; align-items:center; overflow-x:auto; padding:6px 2px 8px; -webkit-overflow-scrolling:touch;}
  .rail::-webkit-scrollbar{height:3px;}
  .rail-edge{width:10px; height:2px; background:var(--line); flex:0 0 auto;}
  .rail-edge.done{background:var(--done);}
  .rail-edge.blocked{background:var(--blocked);}
  .rail-edge.na{background:transparent; border-top:1px dashed var(--ink-soft);}
  .rail-node{
    width:9px; height:9px; border-radius:50%; flex:0 0 auto;
    background:var(--pending); border:1.5px solid var(--bg);
    box-shadow:0 0 0 1px var(--ink-soft); cursor:pointer;
  }
  .rail-node.done{background:var(--done); box-shadow:0 0 0 1px var(--done);}
  .rail-node.blocked{background:var(--blocked); box-shadow:0 0 0 1px var(--blocked);}

  .controls{display:flex; gap:6px; margin-top:10px; align-items:center; flex-wrap:wrap;}
  .seg-filter{display:flex; flex-wrap:wrap; background:var(--bg-card); border:1px solid var(--line); border-radius:4px; overflow:hidden;}
  .seg-filter button{
    border:none; background:transparent; color:var(--ink-soft); font-size:11.5px;
    padding:6px 10px; font-weight:600; cursor:pointer; font-family:inherit;
  }
  .seg-filter button.active{background:var(--ink); color:var(--bg-card);}
  .jump{flex:1; display:flex;}
  .jump input{
    width:100%; border:1px solid var(--line); border-radius:4px; padding:6px 8px;
    font-size:12.5px; font-family:'IBM Plex Mono',monospace; background:var(--bg-card); color:var(--ink);
  }
  .jump input::placeholder{color:var(--ink-soft); opacity:.8;}

  main{padding:6px 12px 0;}
  .connector{width:34px; display:flex; flex-direction:column; align-items:center; flex:0 0 auto;}
  .connector .dot{width:8px; height:8px; border-radius:50%; background:var(--ink-soft);}
  .connector .stem{width:2px; flex:1; background:var(--line);}

  .seg-row{display:flex; align-items:center; min-height:34px;}
  .seg-row.hide{display:none;}
  .seg-check{
    width:20px; height:20px; border-radius:4px; border:2px solid var(--pending);
    flex:0 0 auto; margin-right:10px; cursor:pointer; position:relative;
  }
  .seg-check.done{background:var(--done); border-color:var(--done);}
  .seg-check.done::after{
    content:''; position:absolute; left:5px; top:1px; width:5px; height:9px;
    border:solid var(--bg-card); border-width:0 2px 2px 0; transform:rotate(40deg);
  }
  .seg-check.blocked{background:var(--blocked); border-color:var(--blocked);}
  .seg-check.blocked::after{
    content:'!'; position:absolute; left:6px; top:-1px; color:var(--bg-card); font-size:13px; font-weight:700;
  }
  .hazard-btn{
    flex:0 0 auto; width:22px; height:22px; border-radius:50%; border:1.5px dashed var(--blocked);
    color:var(--blocked); background:transparent; font-size:12px; line-height:1;
    display:flex; align-items:center; justify-content:center; cursor:pointer; margin-left:6px;
  }
  .hazard-btn.active{background:var(--blocked); color:var(--bg-card); border-style:solid;}
  .blocked-reason{display:block; font-size:10.5px; color:var(--blocked); font-weight:600; margin-top:2px;}
  .seg-info{font-size:11.5px; color:var(--ink-soft); line-height:1.4;}
  .seg-info b{font-family:'IBM Plex Mono',monospace; color:var(--ink); font-weight:600;}
  .seg-note{
    display:inline-block; font-size:9.5px; font-weight:600; padding:1px 6px;
    border-radius:8px; background:var(--rust-bg); color:var(--rust); margin-left:6px;
  }

  .tower-row{margin:6px 0;}
  .tower-row.hide{display:none;}
  .tower-card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:6px;
    padding:10px 12px; display:flex; align-items:center; gap:10px; flex:1; flex-wrap:wrap;
    transition:background .15s, border-color .15s;
  }
  .tower-card.done{border-color:var(--done); background:var(--done-bg);}
  .tower-card.blocked{border-color:var(--blocked); background:var(--blocked-bg);}
  .tower-check{
    width:30px; height:30px; border-radius:50%; border:2.5px solid var(--pending);
    flex:0 0 auto; cursor:pointer; position:relative; background:var(--bg-card);
  }
  .tower-check.done{background:var(--done); border-color:var(--done);}
  .tower-check.done::after{
    content:''; position:absolute; left:9px; top:5px; width:6px; height:12px;
    border:solid var(--bg-card); border-width:0 3px 3px 0; transform:rotate(40deg);
  }
  .tower-check.blocked{background:var(--blocked); border-color:var(--blocked);}
  .tower-check.blocked::after{
    content:'!'; position:absolute; left:12px; top:2px; color:var(--bg-card); font-size:18px; font-weight:700;
  }
  .tower-body{flex:1; min-width:0;}
  .tower-top{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .tower-no{font-family:'Oswald',sans-serif; font-size:16px; font-weight:700;}
  .tower-area{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--ink-soft);}
  .tower-area b{color:var(--ink); font-weight:600;}
  .tower-note{font-size:9.5px; font-weight:600; padding:1px 6px; border-radius:8px; background:var(--pending-bg); color:var(--pending);}
  .field-note{display:block; font-size:10.5px; color:var(--ink-soft); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .field-note.danger{color:var(--blocked); font-weight:700;}
  .nav-btn{
    flex:0 0 auto; font-size:10px; font-weight:700; color:var(--ink); background:var(--bg-card);
    border:1px solid var(--ink-soft); border-radius:12px; padding:5px 9px; text-decoration:none;
    white-space:nowrap;
  }
  .seg-nav{flex:0 0 auto; font-size:9.5px; color:var(--ink-soft); text-decoration:none; border:1px solid var(--line); border-radius:10px; padding:2px 7px; margin-left:4px;}

  .report-panel{margin:18px 12px 0; padding:14px; background:var(--blocked-bg); border:1px solid var(--blocked); border-radius:6px;}
  .report-title{font-family:'Oswald',sans-serif; font-weight:700; font-size:14px; color:var(--blocked); letter-spacing:.02em;}
  .report-desc{font-size:11.5px; color:var(--ink); line-height:1.6; margin-top:6px;}
  .report-desc b{color:var(--blocked);}
  .report-btns{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px;}
  .report-btn{
    border:1px solid var(--blocked); background:var(--bg-card); color:var(--blocked);
    border-radius:4px; padding:8px 12px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit;
  }
  .report-btn.primary{background:var(--blocked); color:var(--bg-card);}
  .report-note{font-size:10px; color:var(--ink-soft); margin-top:8px; line-height:1.5;}

  .footnote{
    margin:18px 12px 0; padding:12px; background:var(--bg-card); border:1px solid var(--line);
    border-radius:6px; font-size:11px; color:var(--ink-soft); line-height:1.6;
  }
  .footnote b{color:var(--ink);}

  .bottom-bar{display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:8px; margin:14px 12px 0; font-size:11px; color:var(--ink-soft);}
  .reset-btn{
    background:none; border:1px solid var(--rust); color:var(--rust); border-radius:4px;
    padding:6px 10px; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit;
  }
</style>
</head>

    166:{lat:34.3828714,lon:132.0791495,note:'全体的に急　草低め'},
    167:{lat:34.3792079,lon:132.0768106,note:'全体的にやや急　草低め'},
    168:{lat:34.3763954,lon:132.0756304,note:'全体的にやや急　草少なめ'},
    169:{lat:34.3720131,lon:132.0721677,note:'草多め　山口県'},
    170:{lat:34.3693918,lon:132.0701507,note:'草低め　穴有り　敷地内県境'},
  };


  function fromLabel(i){ return i===0 ? 'トラス' : String(towers[i-1].no); }

  // ============================================================
  // 状態管理
  // ============================================================
  const DEFAULT_STATE = { towers:{}, segs:{}, towerBlocked:{}, towerReason:{}, segBlocked:{}, segReason:{}, updatedAt:null };
  let state = Object.assign({}, DEFAULT_STATE);
  let filter = 'all'; // all | pending | done | blocked
  const STORAGE_KEY = 'higashi_yamaguchi_kusakari_v1';

  // Claude.ai内であれば window.storage が使え、全員で進捗を共有できる（通信が必要）。
  // ファイルとして保存しブラウザで直接開いた場合は window.storage が無いため、
  // その端末のローカル保存（完全オフライン・その端末のみ）に切り替える。
  const hasCloud = (typeof window !== 'undefined') && !!window.storage;
  const syncMode = hasCloud ? 'cloud' : 'local';
  let syncOk = true;

  function withTimeout(promise, ms){
    return new Promise((resolve)=>{
      let settled = false;
      const timer = setTimeout(()=>{ if(!settled){ settled=true; resolve({timedOut:true}); } }, ms);
      promise.then(
        (v)=>{ if(!settled){ settled=true; clearTimeout(timer); resolve({value:v}); } },
        (e)=>{ if(!settled){ settled=true; clearTimeout(timer); resolve({error:e}); } }
      );
    });
  }

  async function loadState(){
    if(syncMode === 'cloud'){
      const r = await withTimeout(window.storage.get(STORAGE_KEY, true), 7000);
      if(r && r.value && r.value.value){
        try{ state = Object.assign({}, DEFAULT_STATE, JSON.parse(r.value.value)); }catch(e){}
        syncOk = true;
      } else if(r && r.timedOut){
        syncOk = false; // 通信待ちタイムアウト：ひとまずローカルの初期状態で表示を続ける
      } else {
        syncOk = true; // 未保存（キー無し）は正常な初回状態
      }
    } else {
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(raw){ state = Object.assign({}, DEFAULT_STATE, JSON.parse(raw)); }
      }catch(e){ /* ignore */ }
    }
  }

  async function saveState(){
    state.updatedAt = new Date().toISOString();
    if(syncMode === 'cloud'){
      const r = await withTimeout(window.storage.set(STORAGE_KEY, JSON.stringify(state), true), 7000);
      syncOk = !!(r && r.value);
    } else {
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); syncOk = true; }catch(e){ syncOk = false; }
    }
    updateSyncNote();
  }

  function updateSyncNote(){
    const el = document.getElementById('syncNote');
    if(!el) return;
    if(syncMode === 'local'){
      el.textContent = '最終更新：'+fmtTime(state.updatedAt)+'（この端末に保存・完全オフライン対応）';
    } else if(syncOk){
      el.textContent = '最終更新：'+fmtTime(state.updatedAt)+'（全員で共有・保存済み）';
    } else {
      el.textContent = '⚠ オフラインのため未保存（電波が入ったら「再同期」を押してください）';
    }
  }

  async function resync(){ await saveState(); render(); }

  function fmtTime(iso){
    if(!iso) return '記録なし';
    const d = new Date(iso);
    return d.getMonth()+1+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }

  // 「一部施工不可」は号基／区間全体の未完了ではなく、部分的な例外の記録。
  // フラグが立っている号基／区間は常に「施工完了」として扱う。
  function isTowerDone(no){ return !!state.towers[no] || !!state.towerBlocked[no]; }
  function isSegDone(i){ return !!state.segs[i] || !!state.segBlocked[i]; }

  async function toggleTower(no){
    state.towers[no] = !state.towers[no];
    render();
    await saveState();
  }
  async function toggleSeg(i){
    state.segs[i] = !state.segs[i];
    render();
    await saveState();
  }
  async function toggleHazardTower(no){
    if(state.towerBlocked[no]){
      if(!confirm('「一部施工不可」の記録を解除しますか？（完了扱いはそのまま残ります）')) return;
      delete state.towerBlocked[no];
      delete state.towerReason[no];
    } else {
      const reason = window.prompt('一部施工できない理由を入力してください', '蜂の巣のため一部施工不可');
      if(reason === null) return;
      state.towerBlocked[no] = true;
      state.towerReason[no] = reason || '一部施工不可';
      state.towers[no] = true;
    }
    render();
    await saveState();
  }
  async function toggleHazardSeg(i){
    if(state.segBlocked[i]){
      if(!confirm('「一部施工不可」の記録を解除しますか？（完了扱いはそのまま残ります）')) return;
      delete state.segBlocked[i];
      delete state.segReason[i];
    } else {
      const reason = window.prompt('一部施工できない理由を入力してください', '蜂の巣のため一部施工不可');
      if(reason === null) return;
      state.segBlocked[i] = true;
      state.segReason[i] = reason || '一部施工不可';
      state.segs[i] = true;
    }
    render();
    await saveState();
  }
  async function doReset(){
    if(!confirm('全ての完了・一部施工不可の記録を消去します。よろしいですか？（この操作は共有データにも反映されます）')) return;
    state = Object.assign({}, DEFAULT_STATE, {towers:{}, segs:{}, towerBlocked:{}, towerReason:{}, segBlocked:{}, segReason:{}});
    render();
    await saveState();
  }

  function exportData(){
    window.prompt('この内容をコピーして、他の端末の「取り込み」に貼り付けてください：', JSON.stringify(state));
  }
  function importData(){
    const input = window.prompt('書き出したデータを貼り付けてください：', '');
    if(!input) return;
    try{
      const incoming = JSON.parse(input);
      Object.keys(incoming.towers||{}).forEach(k=>{ if(incoming.towers[k]) state.towers[k]=true; });
      Object.keys(incoming.segs||{}).forEach(k=>{ if(incoming.segs[k]) state.segs[k]=true; });
      Object.keys(incoming.towerBlocked||{}).forEach(k=>{
        if(incoming.towerBlocked[k] && !state.towerBlocked[k]){
          state.towerBlocked[k] = true;
          state.towerReason[k] = (incoming.towerReason && incoming.towerReason[k]) || '一部施工不可';
          state.towers[k] = true;
        }
      });
      Object.keys(incoming.segBlocked||{}).forEach(k=>{
        if(incoming.segBlocked[k] && !state.segBlocked[k]){
          state.segBlocked[k] = true;
          state.segReason[k] = (incoming.segReason && incoming.segReason[k]) || '一部施工不可';
          state.segs[k] = true;
        }
      });
      render();
      saveState();
    }catch(e){
      alert('データを読み取れませんでした。書き出した内容をそのまま貼り付けてください。');
    }
  }

  // ============================================================
  // 報告一覧表（一部施工不可の箇所のみを抜き出す）
  // ============================================================
  function buildReportRows(){
    const rows = [];
    towers.forEach(t=>{
      if(state.towerBlocked[t.no]){
        rows.push({type:'鉄塔敷地', label:'No.'+t.no, qty:t.area.toLocaleString()+'㎡', reason: state.towerReason[t.no] || '一部施工不可'});
      }
    });
    segments.forEach((g,i)=>{
      if(g.excluded) return;
      if(state.segBlocked[i]){
        rows.push({type:'巡視路', label:fromLabel(i)+' → '+towers[i].no, qty:(g.dist!=null? g.dist.toLocaleString()+'m':'－'), reason: state.segReason[i] || '一部施工不可'});
      }
    });
    return rows;
  }

  function buildReportText(rows){
    const lines = [['種別','箇所','数量','一部施工不可の理由'].join('\t')];
    rows.forEach(r=> lines.push([r.type, r.label, r.qty, r.reason].join('\t')));
    return lines.join('\n');
  }

    const today = new Date();
    const dateStr = today.getFullYear()+'年'+(today.getMonth()+1)+'月'+today.getDate()+'日';
    const trs = rows.map(r=>'<tr><td>'+r.type+'</td><td>'+r.label+'</td><td>'+r.qty+'</td><td>'+r.reason+'</td></tr>').join('');
    return '<!doctype html><html lang="ja"><head><meta charset="utf-8">'
      + '<title>東山口幹線 草刈工事 一部施工不可箇所 一覧表</title>'
      + '<style>body{font-family:sans-serif; padding:24px; color:#22302A;} h1{font-size:18px;} '
      + 'table{border-collapse:collapse; width:100%; margin-top:12px;} th,td{border:1px solid #999; padding:6px 8px; font-size:13px; text-align:left;} '
      + 'th{background:#eee;} .meta{font-size:12px; color:#555; margin-top:4px; line-height:1.6;} '
      + '@media print{button{display:none;}}</style></head><body>'
      + '<h1>東山口幹線　草刈工事　一部施工不可箇所　一覧表</h1>'
      + '<div class="meta">作成日：'+dateStr+' ／ 該当件数：'+rows.length+'件<br>'
      + '鉄塔敷地・巡視路とも工事は完了しております。下記箇所のみ、記載の理由により一部区域を施工できなかった旨をご報告いたします。</div>'
      + '<table><thead><tr><th>種別</th><th>箇所</th><th>数量</th><th>一部施工不可の理由</th></tr></thead><tbody>'
      + (trs || '<tr><td colspan="4">該当箇所なし（全箇所、支障なく施工完了しております）</td></tr>')
      + '</tbody></table>'

      + '</body></html>';
  }

  function copyReportText(){
    window.prompt('この内容をコピーして、メールやメッセージに貼り付けてください：', buildReportText(buildReportRows()));
  }
  function openReportTab(){
    const blob = new Blob([buildReportHtmlDoc(buildReportRows())], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
  }
  function downloadReportHtml(){
    const blob = new Blob([buildReportHtmlDoc(buildReportRows())], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date();
    const ymd = today.getFullYear()+String(today.getMonth()+1).padStart(2,'0')+String(today.getDate()).padStart(2,'0');
    a.href = url;
    a.download = '東山口幹線_一部施工不可報告_'+ymd+'.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 5000);
  }

  // ============================================================
  // 描画
  // ============================================================
  function render(){
    const towerDoneCount = towers.filter(t=>isTowerDone(t.no)).length;
    const towerDoneArea = towers.filter(t=>isTowerDone(t.no)).reduce((s,t)=>s+t.area,0);
    const towerBlockedCount = towers.filter(t=>state.towerBlocked[t.no]).length;

    let segDoneCount = 0, segDoneDist = 0, segBlockedCount = 0;
    segments.forEach((g,i)=>{
      if(g.excluded) return;
      if(isSegDone(i)){ segDoneCount++; segDoneDist += (g.dist||0); }
      if(state.segBlocked[i]) segBlockedCount++;
    });

    const totalDone = towerDoneCount + segDoneCount;
    const totalBlocked = towerBlockedCount + segBlockedCount;
    const totalItems = N + SEG_TOTAL;
    const pct = (a,b)=> b===0 ? 0 : Math.round(a/b*100);

    const headerHtml = `<header class="top">
      <a class="map-link" href="${MAP_URL}" target="_blank" rel="noopener">🗺️ 現場地図を開く</a>
      <div class="line-name">東山口幹線</div>
      <h1>草刈チェックリスト</h1>
      <div class="sub">鉄塔敷地 ${N}基 ・ 巡視路 ${SEG_TOTAL}区間　全${totalItems}件中 <b>${totalDone}</b>件完了（${pct(totalDone,totalItems)}%）${totalBlocked>0 ? ' <span class="warn-chip">⚠ 一部施工不可 '+totalBlocked+'件</span>' : ''}</div>

      <div class="stats">
        <div class="stat">
          <div class="lbl">鉄塔（基）</div>
          <div class="val">${towerDoneCount}/${N}</div>
          <div class="pct">${pct(towerDoneCount,N)}%</div>
          <div class="bar"><div style="width:${pct(towerDoneCount,N)}%"></div></div>
        </div>

          <div class="lbl">敷地面積(㎡)</div>
          <div class="val">${towerDoneArea.toLocaleString()}</div>
          <div class="pct">/ ${TOTAL_TOWER_AREA.toLocaleString()}</div>
          <div class="bar"><div style="width:${pct(towerDoneArea,TOTAL_TOWER_AREA)}%"></div></div>
        </div>
        <div class="stat">
          <div class="lbl">巡視路(m)</div>
          <div class="val">${segDoneDist.toLocaleString()}</div>
          <div class="pct">/ ${TOTAL_DIST.toLocaleString()}</div>

        </div>
        <div class="jump"><input id="jumpInput" type="text" inputmode="numeric" placeholder="No.で検索 例:127"></div>
      </div>

    const footerHtml = `<div class="report-panel">
      <div class="report-title">📋 施主向け報告一覧表</div>
      <div class="report-desc">「一部あり」に記録した箇所（現在 <b>${totalBlocked}</b>件）だけをまとめた一覧表を自動作成します。鉄塔・巡視路自体は施工完了として扱われるので、この一覧表は「一部施工できなかった箇所とその理由」だけを報告するためのものです。</div>
      <div class="report-btns">
        <button class="report-btn primary" id="reportOpenBtn">開く（新しいタブ）</button>

      <div class="report-note">「開く」で今すぐ確認・印刷・PDF保存ができます。同じ端末・同じブラウザを開いている間だけ有効な一時リンクのため、他の人に送る場合は「保存」でファイルにしてから送ってください。</div>
    </div>

    <div class="footnote">
      <b>注記</b><br>
      ・「太陽光連絡」区間・敷地：太陽光発電所敷地内のため、中国電力ネットワーク(株)が施主と協議のうえ草刈期間・箇所を確定するまで立入禁止。<br>

      listHtml += '<div class="tower-row '+(tHidden?'hide':'')+'" id="tower-'+t.no+'">'

        + (tBlocked ? '<span class="blocked-reason">⚠ '+(state.towerReason[t.no]||'一部施工不可')+'</span>' : '')
        + '</div>'
        + (geo ? '<a class="nav-btn" href="https://www.google.com/maps/dir/?api=1&destination='+geo.lat+','+geo.lon+'" target="_blank" rel="noopener">📍ナビ開始</a>' : '')
        + '<div class="hazard-btn '+(tBlocked?'active':'')+'" data-hazard-tower="'+t.no+'" title="一部施工不可を記録">⚠</div>'
        + '</div></div></div>';
    }
    main.innerHTML = listHtml;

    // ---- イベント登録 ----
    main.querySelectorAll('.seg-check').forEach(el=>{
      el.addEventListener('click', ()=> toggleSeg(parseInt(el.getAttribute('data-seg'), 10)));
    });
    main.querySelectorAll('.tower-check').forEach(el=>{
      el.addEventListener('click', ()=> toggleTower(el.getAttribute('data-tower')));
    });
    main.querySelectorAll('[data-hazard-seg]').forEach(el=>{
      el.addEventListener('click', ()=> toggleHazardSeg(parseInt(el.getAttribute('data-hazard-seg'), 10)));
    });
    main.querySelectorAll('[data-hazard-tower]').forEach(el=>{
      el.addEventListener('click', ()=> toggleHazardTower(el.getAttribute('data-hazard-tower')));
    });
    const filterGroup = document.getElementById('filterGroup');
    if(filterGroup){
      filterGroup.querySelectorAll('button').forEach(el=>{
        el.addEventListener('click', ()=>{ filter = el.getAttribute('data-f'); render(); });
      });
    }
    const resetBtn = document.getElementById('resetBtn');
    if(resetBtn) resetBtn.addEventListener('click', doReset);
    const exportBtn = document.getElementById('exportBtn');
    if(exportBtn) exportBtn.addEventListener('click', exportData);
    const importBtn = document.getElementById('importBtn');
    if(importBtn) importBtn.addEventListener('click', importData);
    const resyncBtn = document.getElementById('resyncBtn');
    if(resyncBtn) resyncBtn.addEventListener('click', resync);
    const reportOpenBtn = document.getElementById('reportOpenBtn');
    if(reportOpenBtn) reportOpenBtn.addEventListener('click', openReportTab);
    const reportDownloadBtn = document.getElementById('reportDownloadBtn');
    if(reportDownloadBtn) reportDownloadBtn.addEventListener('click', downloadReportHtml);
    const reportCopyBtn = document.getElementById('reportCopyBtn');
    if(reportCopyBtn) reportCopyBtn.addEventListener('click', copyReportText);
    const jumpInput = document.getElementById('jumpInput');
    if(jumpInput){
      jumpInput.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter'){ jumpTo(jumpInput.value.trim()); }
      });
    }
  }

  function jumpTo(no){
    const el = document.getElementById('tower-'+no);
    if(el){
      el.scrollIntoView({behavior:'smooth', block:'center'});
      el.style.outline = '2px solid var(--rust)';
      setTimeout(()=>{ el.style.outline = ''; }, 1200);
    }
  }

  // ============================================================
  // 初期化：読み込みに失敗・タイムアウトしても必ず画面を表示する
  // ============================================================
  (async function init(){
    try{
      await loadState();
    }catch(e){
      console.error('loadState failed:', e);
      syncOk = false;
    }finally{
      render();
    }
  })();

})();
</script>
</body>
</html>
